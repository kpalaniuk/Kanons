<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="flame" x1="16" y1="3" x2="16" y2="29" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFBA00"/>
      <stop offset="60%" stop-color="#FFB366"/>
      <stop offset="100%" stop-color="#FF8C42"/>
    </linearGradient>
  </defs>

  <!-- Midnight background, slightly rounded -->
  <rect width="32" height="32" rx="5" fill="#0a0a0a"/>

  <!-- Outer ring — the All / unity / the unbroken cycle -->
  <circle cx="16" cy="16" r="13.5" fill="none" stroke="url(#flame)" stroke-width="1.2"/>

  <!-- Upward triangle inscribed in circle — fire, ascent, the forge -->
  <!-- Vertices of equilateral triangle at r=11 from center -->
  <polygon
    points="16,4.5 25.02,20.5 6.98,20.5"
    fill="none"
    stroke="url(#flame)"
    stroke-width="1.3"
    stroke-linejoin="round"
  />

  <!-- Secondary inner ring — the orbit, the process, the loop -->
  <circle cx="16" cy="16" r="4.5" fill="none" stroke="url(#flame)" stroke-width="0.9" opacity="0.55"/>

  <!-- Prima materia — the source point, the seed of everything -->
  <circle cx="16" cy="16" r="2" fill="url(#flame)"/>
</svg>
